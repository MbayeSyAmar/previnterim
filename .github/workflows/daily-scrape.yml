name: Scraping quotidien offres Sénégal

on:
  schedule:
    # 06h00 heure de Dakar (UTC+0 en hiver, UTC+0 toute l'année pour Dakar)
    - cron: '0 6 * * *'
  workflow_dispatch: # Déclenchement manuel depuis l'onglet Actions de GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Installer les dépendances
        run: pip install -r scraper/requirements.txt

      - name: Lancer le scraping
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper/scrape.py
